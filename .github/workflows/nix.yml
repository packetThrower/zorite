# Builds the Nix flake on Linux so it can't rot silently — and, while the
# cargoLock.outputHashes are placeholders, the failure log is where the real
# hashes come from (nix prints "got: sha256-…" for each git dependency).
#
# Runs only when the build inputs change; not a required check.
name: Nix

on:
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock
      - Cargo.lock
      - Cargo.toml
      - "src/**"
      - "crates/**"
      - .github/workflows/nix.yml
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Both flake systems get a real build (arm on GitHub's arm runners).
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Build the flake
        run: nix build .# --print-build-logs
      - name: Smoke-check the binary
        run: test -x result/bin/zorite && ldd result/bin/zorite | head -20

  # TEMPORARY (delete after the nixpkgs submission lands): builds the staged
  # pkgs/by-name derivation exactly as nixpkgs will, so the PR opens with a
  # build already proven on Linux.
  nixpkgs-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Build the nixpkgs package
        run: |
          nix build --impure --print-build-logs --expr \
            '((builtins.getFlake (toString ./.)).inputs.nixpkgs.legacyPackages.x86_64-linux.callPackage ./nixpkgs-staging/package.nix { })'
      - name: Smoke-check
        run: test -x result/bin/zorite && ldd result/bin/zorite | head -5
