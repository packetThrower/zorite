name: Actionlint

# Lints the workflow files themselves — catches `${{ }}` expression
# typos, invalid `runs-on` labels, shell-quoting bugs in `run:`
# blocks (via the bundled shellcheck pass), and unpinned actions
# before they cost a real CI run. Scoped to `.github/workflows/**`
# so it runs exactly when a workflow changes and never otherwise.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

# Read-only: actionlint just reads the workflow files and reports
# findings as inline `::error::` annotations through the run's own
# token — no extra scopes needed.
permissions:
  contents: read

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: actionlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA like every other action in this
      # repo; the `# vX.Y.Z` comment is what Dependabot bumps.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
